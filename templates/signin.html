<body class="index-page">

  <header id="header" class="header d-flex align-items-center sticky-top">
    <div class="container-fluid container-xl position-relative d-flex align-items-center">
      <nav id="navmenu" class="navmenu">
        <i class="mobile-nav-toggle d-xl-none bi bi-lis"></i>
      </nav>
    </div>
  </header>

  <main class="main">


    <!-- Signin Section -->
    <section id="signin" class="contact section">

      <!-- Section Title -->
      <div class="container section-title" data-aos="fade-up">
        <h2>Sign In</h2>
        <p>Sign in to access the Ecovision platform for seasonal detection using plant images and environmental parameters</p>
      </div><!-- End Section Title -->

      <div class="container" data-aos="fade-up" data-aos-delay="100">

        <div class="row justify-content-center">
          <div class="col-lg-8">
            <form action="/signin" method="post" class="signup-form" data-aos="fade-up" data-aos-delay="200">
              {% if message %}
              <div class="alert alert-warning alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
              {% endif %}

              <div class="row gy-4">
                <div class="col-md-12">
                  <input type="text" name="user" class="form-control" placeholder="Username" required>
                </div>

                <div class="col-md-12">
                  <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>

                <div class="col-md-12 text-center">
                  <button type="submit">Sign In</button>
                  <p class="mt-3 mb-0">Don't have an account? <a href="/logon">Sign Up</a></p>
                </div>

              </div>
            </form>
          </div><!-- End Signin Form -->

        </div>

      </div>

    </section><!-- /Signin Section -->
